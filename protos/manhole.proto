syntax = "proto3";
package  manhole;

option csharp_namespace = "Sewers.Manhole.Generated";

message CpuUsageInfo {
    int32 cpu_id = 1;
    int32 thread_usage = 2; 
    double temperature = 3;
}

message GpuUsageInfo {
    int32 gpu_id = 1;
    double vram_usage = 2; 
    double temperature = 3;
}

message HeartbeatRequest {
    string id = 1;
    bool status = 2;
    repeated CpuUsageInfo cpus = 3;
    repeated GpuUsageInfo gpus = 4;
    double ram_usage = 5;
}

message HeartbeatResponse{
    bool success = 1;
}

service Heartbeat{
    rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
}