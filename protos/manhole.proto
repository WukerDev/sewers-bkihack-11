syntax = "proto3";
package manhole;

message Empty {}

message GpuStatic {
    int32 gpu_id = 1;      // Id liczone od 0
    string model = 2;      // np. "NVIDIA GeForce RTX 3060"
    double vram_gb = 3;    // W GB, zgodnie z Twoją klasą C# (double Vram)
}

message CpuStatic {
    int32 cpu_id = 1;      // Id liczone od 0
    string model = 2;      // np. "Intel(R) Core(TM) i7-10750H"
    int32 threads = 3;     // Łączna liczba wątków tej sztuki procesora
}

message HardwareStaticInfo {
    string node_id = 1;
    uint64 total_ram_bytes = 2;
    repeated CpuStatic cpus = 3;
    repeated GpuStatic gpus = 4;
}

message CpuDynamic {
    int32 cpu_id = 1;
    double usage_percent = 2; // Średnia z całej sztuki
    double temperature = 3;
}

message GpuDynamic {
    int32 gpu_id = 1;
    uint64 vram_used_bytes = 2;
    double temperature = 3;
}

message DynamicStatsResponse {
    string status = 1;
    uint64 ram_used_bytes = 2;
    repeated CpuDynamic cpus = 3;
    repeated GpuDynamic gpus = 4;
}

service NodeMonitor {
    rpc GetHardwareStaticInfo (Empty) returns (HardwareStaticInfo);
    rpc StreamDynamicStats (Empty) returns (stream DynamicStatsResponse);
}