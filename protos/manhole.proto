syntax = "proto3";
package manhole;

option csharp_namespace = "Sewers.ManholeGenerated";

// Dodajemy puste zapytanie, bo serwer po prostu czeka na "zaczepkę"
message Empty {}

message CpuUsageInfo {
    int32 cpu_id = 1;
    int32 thread_usage = 2; 
    double temperature = 3;
}

message GpuUsageInfo {
    int32 gpu_id = 1;
    double vram_usage = 2; 
    double temperature = 3;
}

message HeartbeatResponse {
    string id = 1;
    string status = 2; // "free", "busy", "error"
    repeated CpuUsageInfo cpus = 3;
    repeated GpuUsageInfo gpus = 4;
    double ram_usage = 5;
}

service NodeMonitor {
    // Klient (Mózg) wywołuje raz, a Serwer (Manhole) strumieniuje dane póki połączenie trwa
    rpc StreamStats (Empty) returns (stream HeartbeatResponse);
}