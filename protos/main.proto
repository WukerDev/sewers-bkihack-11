syntax = "proto3";

package sewers;

message Gpu{
string id = 1;
string model = 2;
double vram = 3;
int32 gpu_id = 4;
double temperature = 5;
double vram_usage = 6;
}

message Cpu{
string id = 1;
string model = 2;
int32 threads = 3;
int32 cpu_id = 4;
double temperature = 5;
int32 threads_usage = 6;
}

message DailyWindow {
  google.protobuf.Duration window_start = 1;
  google.protobuf.Duration window_end = 2;
}

message WindowSchedule {
  DailyWindow monday = 1;
  DailyWindow tuesday = 2;
  DailyWindow wednesday = 3;
  DailyWindow thursday = 4;
  DailyWindow friday = 5;
  DailyWindow saturday = 6;
  DailyWindow sunday = 7;
}

message Manhole {
  string id = 1;
  string name = 2;
  string owner_id = 3;
  Company owner = 4;
  repeated Gpu gpus = 5;
  repeated Cpu cpus = 6;
  double ram = 7;
  WindowSchedule window_schedule = 8;
  double city_longitude = 9;
  double city_latitude = 10;
  double price_per_teraflop = 11;
  string address = 12;
  double price_per_teraflop_day = 13;
  double price_per_teraflop_night = 14;
}

message Company {
  string id = 1;
  string name = 2;
  string status = 3;
  repeated Manhole manholes = 4;
}

message Cluster {
  string id = 1;
  string name = 2;
  double lat = 3;
  double lng = 4;
  string status = 5;
  repeated Company companies = 6;
}

message User {
  string id = 1;
  string name = 2;
  string avatar = 3;
  string role = 4;
  double balance = 5;
  string currency = 6;
}

message Metrics {
  int32 online_nodes = 1;
  string total_vram = 2;
  int32 queued_tasks = 3;
  int32 companies = 4;
  int32 gpus = 5;
}

message Task {
  int32 id = 1;
  string name = 2;
  string type = 3;
  string model = 4;
  string status = 5;
  int32 progress = 6;
}

message TaskType {
  string value = 1;
  string label = 2;
  string icon = 3;
  string description = 4;
}

message GetConfigRequest {}

message ConfigResponse {
  Metrics metrics = 1;
  repeated Cluster clusters = 2;
  User current_user = 3;
  repeated TaskType task_types = 4;
  repeated string available_models = 5;
}

message GetTasksRequest {}

message GetTasksResponse {
  repeated Task tasks = 1;
}

message CreateTaskRequest {
  string name = 1;
  string type = 2;
  string base_model = 3;
  int32 priority = 4;
}

message CreateTaskResponse {
  Task task = 1;
  bool success = 2;
  string message = 3;
}

message RemoveTaskRequest {
  int32 id = 1;
}

message RemoveTaskResponse {
  bool success = 1;
  string message = 2;
}

message EditTaskRequest {
  int32 id = 1;
  string name = 2;
  string type = 3;
  string model = 4;
}

message EditTaskResponse {
  Task task = 1;
  bool success = 2;
  string message = 3;
}

message PauseTaskRequest {
  int32 id = 1;
}

message PauseTaskResponse {
  Task task = 1;
  bool success = 2;
  string message = 3;
}

message StopTaskRequest {
  int32 id = 1;
}

message StopTaskResponse {
  Task task = 1;
  bool success = 2;
  string message = 3;
}

message Invoice {
  string id = 1;
  string date = 2;
  double amount = 3;
  string status = 4;
}

message GetBillingRequest {}

message GetBillingResponse {
  repeated Invoice invoices = 1;
  double current_month_spending = 2;
  double hourly_rate = 3;
  repeated double daily_spending = 4;
  repeated int32 resource_usage = 5;
}

message ApiKey {
  string id = 1;
  string name = 2;
  string key = 3;
  string created_at = 4;
}

message GetApiKeysRequest {}

message GetApiKeysResponse {
  repeated ApiKey keys = 1;
}

service ApiService {
  rpc GetApiKeys (GetApiKeysRequest) returns (GetApiKeysResponse);
}

message ProviderNode {
  string id = 1;
  string name = 2;
  string uptime = 3;
  string power_usage = 4;
  string vram_usage = 5;
  string gpu_temp = 6;
  string cpu_usage = 7;
  string net_latency = 8;
  string status = 9;
}

message GetNodesRequest {}

message GetNodesResponse {
  repeated ProviderNode nodes = 1;
}

service ProviderService {
  rpc GetNodes (GetNodesRequest) returns (GetNodesResponse);
}
import "google/protobuf/duration.proto";

message Agent {
  string id = 1;
  string name = 2;
  string specialization = 3;
  string status = 4;
  double monthly_cost = 5;
  string node = 6;
  string avatar = 7;
}

message GetAgentsRequest {}

message GetAgentsResponse {
  repeated Agent agents = 1;
}

service AgentService {
  rpc GetAgents (GetAgentsRequest) returns (GetAgentsResponse);
}

service BillingService {
  rpc GetBilling (GetBillingRequest) returns (GetBillingResponse);
}

service DashboardService {
  rpc GetConfig (GetConfigRequest) returns (ConfigResponse);
  rpc StreamMetrics (GetConfigRequest) returns (stream Metrics);
}

service TaskService {
  rpc GetTasks (GetTasksRequest) returns (GetTasksResponse);
  rpc CreateTask (CreateTaskRequest) returns (CreateTaskResponse);
  rpc StreamTaskProgress (GetTasksRequest) returns (stream Task);
  rpc RemoveTask (RemoveTaskRequest) returns (RemoveTaskResponse);
  rpc EditTask (EditTaskRequest) returns (EditTaskResponse);
  rpc PauseTask (PauseTaskRequest) returns (PauseTaskResponse);
  rpc StopTask (StopTaskRequest) returns (StopTaskResponse);
}